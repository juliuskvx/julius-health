name: Daily Garmin Sync

on:
  schedule:
    # Runs at 9:00am Lithuania time (UTC+3) = 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install garminconnect PyGithub

      - name: Run Garmin sync
        env:
          GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GITHUB_TOKEN:    ${{ secrets.PAT_TOKEN }}
          GITHUB_REPO:     juliuskvx/julius-health
        run: python sync.py

      - name: Confirm sync completed
        run: echo "Sync completed at $(date)"
